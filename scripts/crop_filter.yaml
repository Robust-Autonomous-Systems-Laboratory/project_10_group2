filters:
  - class_name: mp2p_icp_filters::FilterBoundingBox
    params:
      input_pointcloud_layer: "map"
      inside_pointcloud_layer: "map_cropped"
      bounding_box_min: [-70.0, -100.0, -2.5]
      bounding_box_max: [110.0, 60.0, 6.0]

  - class_name: mp2p_icp_filters::FilterBoundingBox
    params:
      input_pointcloud_layer: "static_map"
      inside_pointcloud_layer: "static_map_cropped"
      bounding_box_min: [-70.0, -100.0, -2.5]
      bounding_box_max: [110.0, 60.0, 6.0]